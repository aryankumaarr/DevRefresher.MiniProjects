<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobTrackerApp</title>
    <link rel="stylesheet" href="../Stylesheets/JobAppTrackerStyles.css" />
  </head>
  <body>
    <h1 id="jobTrackingHeading">Job Tracker</h1>
    <main>
      <input type="text" id="searchBar" placeholder="Search Jobs"></input>
      <section id="stats">
        <h4>Status</h4>
        <p>Average Salary : <span>$0</span></p>
        <p>Highest Salary : <span>$0</span></p>
      </section>
      <section id="section3Wrapper">
      <div id="cardcontainer">
      </div>
      <div id="createJobCardContainer">
        <form id="createJobCardInput">
          <input type="text" placeholder="Company Name" id="companyName">
          <input type="text" placeholder="Role" id="role">
          <input type="number" placeholder="Salary" id="Salary">
          <button type="submit">Submit</button>
        </form>
      </div>
      </section>
      <script src="../Scripts/JobAppTrackerScript.js"></script>
    </main>
  </body>
</html>
